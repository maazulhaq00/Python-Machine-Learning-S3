{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h3>Diabetes Prediction Form</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        <div class="mb-3">
                            <label for="Pregnancies" class="form-label">Pregnancies</label>
                            <input type="number" class="form-control" id="Pregnancies" name="Pregnancies" required>
                        </div>
                        <div class="mb-3">
                            <label for="Glucose" class="form-label">Glucose</label>
                            <input type="number" class="form-control" id="Glucose" name="Glucose" required>
                        </div>
                        <div class="mb-3">
                            <label for="BloodPressure" class="form-label">Blood Pressure</label>
                            <input type="number" class="form-control" id="BloodPressure" name="BloodPressure" required>
                        </div>
                        <div class="mb-3">
                            <label for="SkinThickness" class="form-label">Skin Thickness</label>
                            <input type="number" class="form-control" id="SkinThickness" name="SkinThickness" required>
                        </div>
                        <div class="mb-3">
                            <label for="Insulin" class="form-label">Insulin</label>
                            <input type="number" class="form-control" id="Insulin" name="Insulin" required>
                        </div>
                        <div class="mb-3">
                            <label for="BMI" class="form-label">BMI</label>
                            <input type="number" step="0.1" class="form-control" id="BMI" name="BMI" required>
                        </div>
                        <div class="mb-3">
                            <label for="DiabetesPedigreeFunction" class="form-label">Diabetes Pedigree Function</label>
                            <input type="number" step="0.01" class="form-control" id="DiabetesPedigreeFunction" name="DiabetesPedigreeFunction" required>
                        </div>
                        <div class="mb-3">
                            <label for="Age" class="form-label">Age</label>
                            <input type="number" class="form-control" id="Age" name="Age" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Predict</button>
                        </div>
                    </form>

                 {% if prediction_text %}
                <div class="alert alert-info mt-3">
                    {{ prediction_text }}
                </div>
                {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
